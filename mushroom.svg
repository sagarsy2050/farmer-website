<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bgmush" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5f5f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e8e8e0;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="cap1" cx="40%" cy="40%">
      <stop offset="0%" style="stop-color:#a4774a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7a5c3e;stop-opacity:1" />
    </radialGradient>
    <radialGradient id="cap2" cx="45%" cy="35%">
      <stop offset="0%" style="stop-color:#c99060;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b6f47;stop-opacity:1" />
    </radialGradient>
  </defs>
  <rect fill="url(#bgmush)" width="400" height="300"/>
  
  <!-- Mushroom 1 (left) -->
  <ellipse cx="130" cy="140" rx="55" ry="50" fill="url(#cap1)"/>
  <rect x="110" y="175" width="40" height="100" fill="#d4c5b9" opacity="0.9"/>
  <ellipse cx="130" cy="175" rx="22" ry="8" fill="#e0d5cc" opacity="0.6"/>
  
  <!-- Mushroom 2 (center-right) -->
  <ellipse cx="270" cy="130" rx="60" ry="55" fill="url(#cap2)"/>
  <rect x="245" y="170" width="50" height="110" fill="#ddd0c5" opacity="0.9"/>
  <ellipse cx="270" cy="170" rx="28" ry="10" fill="#e8ddd2" opacity="0.6"/>
  
  <!-- Mushroom 3 (center) -->
  <ellipse cx="200" cy="160" rx="50" ry="48" fill="#9b7a5c" opacity="0.95"/>
  <rect x="185" y="195" width="30" height="85" fill="#cfc3b8" opacity="0.85"/>
  <ellipse cx="200" cy="195" rx="18" ry="8" fill="#d9cdc3" opacity="0.5"/>
  
  <!-- Shine/highlights -->
  <ellipse cx="145" cy="110" rx="20" ry="15" fill="#ffffff" opacity="0.15"/>
  <ellipse cx="280" cy="100" rx="22" ry="18" fill="#ffffff" opacity="0.12"/>
</svg>